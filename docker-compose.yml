version: '3.8'

services:
  # =============================================================================
  # DATABASES
  # =============================================================================
  # IMS / Master: products, parties, categories, etc.
  postgres:
    image: postgres:16-alpine
    container_name: ims-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ims_user
      POSTGRES_PASSWORD: ims_password
      POSTGRES_DB: ims_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./services/master-service/app/db/schemas:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ims_user -d ims_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Reports: Main Dashboard, sales/inventory/PO/ads/traffic reports (report-service)
  postgres-reports:
    image: postgres:16-alpine
    container_name: ims-postgres-reports
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: mypassword
      POSTGRES_DB: ams_db
    ports:
      - "5441:5432"
    volumes:
      - postgres_reports_data:/var/lib/postgresql/data
      - ./scripts/setup_reports_db.sql:/docker-entrypoint-initdb.d/01_setup_reports.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ams_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # =============================================================================
  # PGADMIN (Optional - for database management)
  # =============================================================================
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: ims-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@inventory.local
      PGADMIN_DEFAULT_PASSWORD: admin123
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - "5050:80"
    depends_on:
      - postgres
      - postgres-reports
    profiles:
      - tools  # Only start with: docker compose --profile tools up

  # =============================================================================
  # MASTER SERVICE
  # =============================================================================
  master-service:
    build:
      context: .
      dockerfile: services/master-service/Dockerfile
    container_name: ims-master-service
    restart: unless-stopped
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ims_db
      DB_USER: ims_user
      DB_PASSWORD: ims_password
      SERVICE_PORT: 8001
      DEBUG: "true"
    ports:
      - "8001:8001"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./services/master-service:/app
      - ./shared:/app/shared
    command: uvicorn app.main:app --host 0.0.0.0 --port 8001 --reload
    profiles:
      - services  # Only start with: docker compose --profile services up

volumes:
  postgres_data:
    driver: local
  postgres_reports_data:
    driver: local

networks:
  default:
    name: ims-network

