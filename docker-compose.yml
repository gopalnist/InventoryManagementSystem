# =============================================================================
# IMPORTANT: Run all "docker compose" commands from the PROJECT ROOT (this directory).
# Example: docker compose build report-service   or   docker compose up -d
# Report/frontend use Dockerfile.report-service and Dockerfile.frontend at project root.
# =============================================================================
# PORTS (host -> service)
# =============================================================================
#   5432  -> postgres (ims_db)
#   5441  -> postgres-reports (ams_db)
#   5050  -> pgadmin (profile: tools)
#   8001  -> master-service (profile: services)
#   8005  -> report-service (Reports / Main Dashboard API)
#   3001  -> frontend (UI)
# =============================================================================
# (version is obsolete in Compose V2 and has been removed)
# =============================================================================

services:
  # =============================================================================
  # DATABASES
  # =============================================================================
  # IMS / Master: products, parties, categories, etc.
  postgres:
    image: postgres:16-alpine
    container_name: ims-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ims_user
      POSTGRES_PASSWORD: ims_password
      POSTGRES_DB: ims_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./services/master-service/app/db/schemas:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ims_user -d ims_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Reports: Main Dashboard, sales/inventory/PO/ads/traffic reports (report-service)
  postgres-reports:
    image: postgres:16-alpine
    container_name: ims-postgres-reports
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: mypassword
      POSTGRES_DB: ams_db
    ports:
      - "5441:5432"
    volumes:
      - postgres_reports_data:/var/lib/postgresql/data
      - ./scripts/setup_reports_db.sql:/docker-entrypoint-initdb.d/01_setup_reports.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ams_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # =============================================================================
  # PGADMIN (Optional - for database management)
  # =============================================================================
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: ims-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@inventory.local
      PGADMIN_DEFAULT_PASSWORD: admin123
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - "5150:80"
    depends_on:
      - postgres
      - postgres-reports
    profiles:
      - tools  # Only start with: docker compose --profile tools up

  # =============================================================================
  # REPORT SERVICE (Main Dashboard, sales/inventory/PO/ads/traffic reports)
  # =============================================================================
  report-service:
    build:
      context: .
      dockerfile: Dockerfile.report-service
    container_name: ims-report-service
    restart: unless-stopped
    environment:
      DB_HOST: postgres-reports
      DB_PORT: 5432
      DB_NAME: ams_db
      DB_USER: postgres
      DB_PASSWORD: mypassword
      SERVICE_PORT: 8005
      DEBUG: "true"
    ports:
      - "8005:8005"
    depends_on:
      postgres-reports:
        condition: service_healthy
    volumes:
      - ./services/report-service:/app
      - ./shared:/app/shared
    command: uvicorn app.main:app --host 0.0.0.0 --port 8005 --reload

  # =============================================================================
  # FRONTEND (UI)
  # =============================================================================
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: ims-frontend
    restart: unless-stopped
    environment:
      VITE_PROXY_REPORTS_TARGET: http://report-service:8005
      VITE_PROXY_MASTER_TARGET: http://master-service:8001
      VITE_PROXY_INVENTORY_TARGET: http://localhost:8004
      VITE_PROXY_AMS_TARGET: http://localhost:8003
      VITE_PROXY_SALES_TARGET: http://localhost:8002
    ports:
      - "3001:3001"
    depends_on:
      - report-service
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev -- --host 0.0.0.0

  # =============================================================================
  # MASTER SERVICE (Products, Parties, etc. - optional profile)
  # =============================================================================
  master-service:
    build:
      context: .
      dockerfile: services/master-service/Dockerfile
    container_name: ims-master-service
    restart: unless-stopped
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ims_db
      DB_USER: ims_user
      DB_PASSWORD: ims_password
      SERVICE_PORT: 8001
      DEBUG: "true"
    ports:
      - "8001:8001"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./services/master-service:/app
      - ./shared:/app/shared
    command: uvicorn app.main:app --host 0.0.0.0 --port 8001 --reload
    profiles:
      - services  # Start with: docker compose --profile services up

volumes:
  postgres_data:
    driver: local
  postgres_reports_data:
    driver: local

networks:
  default:
    name: ims-network

